name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8
      - name: Install frontend dependencies
        run: bun install --cwd frontend --frozen-lockfile
      - name: Lint frontend
        run: bun run --cwd frontend lint
      - name: Build frontend
        run: bun run --cwd frontend build

  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - name: Run backend tests
        run: backend/./mvnw -f backend/pom.xml test

  ai-service:
    name: AI Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install AI service dependencies
        run: |
          python -m pip install --upgrade pip
          cd ai-service
          pip install -r requirements.txt
      - name: Lint AI service
        run: cd ai-service && ruff check app tests
      - name: Test AI service
        run: cd ai-service && pytest tests
