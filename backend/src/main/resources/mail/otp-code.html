<!DOCTYPE html>
<html lang="en">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{subject}}</title>
  </head>
  <body style="margin: 0; padding: 0; background-color: #f5f9ff; color: #000000; font-family: 'Avenir Next', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;">
    <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="width: 100%; background-color: #f5f9ff; margin: 0; padding: 24px 0;">
      <tr>
        <td align="center" style="padding: 24px 16px;">
          <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="width: 100%; max-width: 640px;">
            <tr>
              <td style="background-color: #000000; border-radius: 28px; padding: 36px 36px 28px 36px; color: #ffffff;">
                <div style="display: inline-block; padding: 8px 14px; border: 1px solid rgba(255, 255, 255, 0.35); border-radius: 999px; font-size: 11px; line-height: 16px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: #ffffff; background-color: rgba(255, 255, 255, 0.1);">
                  Email OTP
                </div>
                <h1 style="margin: 22px 0 0 0; font-size: 36px; line-height: 1.1; font-weight: 700; letter-spacing: -0.04em; color: #ffffff;">
                  Your Clair Tax sign-in code
                </h1>
                <p style="margin: 18px 0 0 0; font-size: 16px; line-height: 28px; color: rgba(255, 255, 255, 0.78);">
                  Enter this code in the Clair Tax mobile app to finish signing in.
                </p>
              </td>
            </tr>
            <tr>
              <td style="padding-top: 18px;">
                <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="width: 100%; background-color: #ffffff; border: 1px solid #d6e0f1; border-radius: 24px;">
                  <tr>
                    <td style="padding: 28px;">
                      <p style="margin: 0; font-size: 11px; line-height: 16px; font-weight: 700; letter-spacing: 0.28em; text-transform: uppercase; color: #5e9bff;">
                        One-time code
                      </p>
                      <p style="margin: 18px 0 0 0; font-size: 40px; line-height: 1; font-weight: 700; letter-spacing: 0.18em; color: #000000;">
                        {{code}}
                      </p>
                      <p style="margin: 18px 0 0 0; font-size: 14px; line-height: 24px; color: #4f5866;">
                        This sign-in code expires in <span style="font-weight: 700; color: #000000;">{{expiryLabel}}</span>.
                      </p>
                      <p style="margin: 18px 0 0 0; font-size: 13px; line-height: 22px; color: #4f5866;">
                        If you did not request this code, you can safely ignore it.
                      </p>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
