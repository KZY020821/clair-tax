spring:
  application:
    name: clair-tax-backend
  profiles:
    default: local
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/clair_tax}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

server:
  port: ${SERVER_PORT:8080}

clair:
  auth:
    frontend-base-url: ${CLAIR_AUTH_FRONTEND_BASE_URL:http://localhost:3000}
    magic-link-ttl: ${CLAIR_AUTH_MAGIC_LINK_TTL:PT15M}
    session-ttl: ${CLAIR_AUTH_SESSION_TTL:P30D}
    cookie-name: ${CLAIR_AUTH_COOKIE_NAME:clair_tax_session}
  dev-user:
    email: ${CLAIR_DEV_USER_EMAIL:dev@taxrelief.local}
  receipts:
    storage-path: ${CLAIR_RECEIPTS_STORAGE_PATH:/tmp/clair-tax-receipts}
    upload-path: ${CLAIR_RECEIPTS_UPLOAD_PATH:/tmp/clair-tax-receipt-uploads}
    bucket-name: ${CLAIR_RECEIPTS_BUCKET_NAME:clair-tax-receipts}
    upload-intent-ttl: ${CLAIR_RECEIPTS_UPLOAD_INTENT_TTL:PT15M}
    internal-api-token: ${CLAIR_RECEIPTS_INTERNAL_API_TOKEN:dev-internal-token}
    aws:
      region: ${AWS_REGION:ap-southeast-1}
    queue:
      url: ${CLAIR_RECEIPTS_QUEUE_URL:}
