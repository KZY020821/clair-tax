spring:
  application:
    name: clair-tax-backend
  profiles:
    default: local
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/clair_tax}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

server:
  port: ${SERVER_PORT:8080}

clair:
  dev-user:
    email: ${CLAIR_DEV_USER_EMAIL:dev@taxrelief.local}
  receipts:
    storage-path: ${CLAIR_RECEIPTS_STORAGE_PATH:/tmp/clair-tax-receipts}
