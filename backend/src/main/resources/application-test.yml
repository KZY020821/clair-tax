spring:
  datasource:
    url: jdbc:h2:mem:clair_tax_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;NON_KEYWORDS=YEAR;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
  mail:
    username: clairtax.notification@gmail.com
    password: test-app-password

clair:
  receipts:
    storage-path: /tmp/clair-tax-test-receipts
    upload-path: /tmp/clair-tax-test-receipt-uploads
    internal-api-token: test-internal-token
